<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャプター選択 | RSU学習ゲーム</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0a0f28 0%, #1a1a3e 50%, #0f1a3a 100%);
            min-height: 100vh;
            font-family: 'Noto Sans JP', 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
            color: #fff;
        }

        .chapter-select-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 32px 32px;
            min-height: 100vh;
        }

        /* パンくずリスト */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }

        .breadcrumb a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: color 0.2s;
        }

        .breadcrumb a:hover {
            color: rgba(180, 200, 255, 0.9);
        }

        .breadcrumb__sep {
            color: rgba(255, 255, 255, 0.3);
        }

        .breadcrumb__current {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
        }

        /* ヘッダー */
        .chapter-header {
            text-align: center;
            margin-bottom: 12px;
        }

        .chapter-header h1 {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        /* チャプターグリッド - 4列 */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        /* カード */
        .chapter-card {
            background: rgba(20, 30, 60, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.3s,
                        border-color 0.3s,
                        background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chapter-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 16px 40px rgba(0,0,0,0.3), 0 0 20px rgba(100, 140, 255, 0.1);
            border-color: rgba(150, 180, 255, 0.35);
            background: rgba(30, 45, 80, 0.75);
        }

        .chapter-card.cleared {
            border-color: rgba(74, 222, 128, 0.3);
        }

        .chapter-card.cleared::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 10px;
            width: 22px;
            height: 22px;
            background: #4ade80;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #000;
            font-weight: 900;
        }

        .card-thumbnail {
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .card-chapter-number {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 1.1rem;
            color: #fff;
            font-weight: 700;
            line-height: 1.4;
            margin-top: 4px;
        }

        /* フッター */
        .chapter-footer {
            text-align: center;
            margin-top: 36px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.75rem;
        }

        @media (max-height: 800px) {
            .card-thumbnail {
                height: 100px;
            }
            .chapter-card {
                padding: 12px;
            }
            .card-title {
                font-size: 0.85rem;
            }
        }

        @media (max-height: 650px) {
            .card-thumbnail {
                height: 70px;
            }
            .chapter-header {
                margin-bottom: 16px;
            }
            .chapter-header h1 {
                font-size: 1.4rem;
            }
            .chapter-grid {
                gap: 10px;
            }
            .chapter-card {
                padding: 10px;
            }
            .card-chapter-number {
                font-size: 0.6rem;
                margin-bottom: 2px;
            }
            .card-title {
                font-size: 0.78rem;
            }
        }

        @media (max-width: 1200px) {
            .chapter-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .chapter-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .chapter-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="chapter-select-container">
        <!-- パンくずリスト -->
        <nav class="breadcrumb">
            <a href="index.html" data-i18n="chapters.breadcrumb.top">トップ</a>
            <span class="breadcrumb__sep">＞</span>
            <span class="breadcrumb__current" data-i18n="chapters.breadcrumb.current">チャプター選択</span>
        </nav>

        <!-- ヘッダー -->
        <div class="chapter-header">
            <h1 data-i18n="chapters.title">📖 チャプター選択</h1>
        </div>

        <!-- チャプターグリッド -->
        <div class="chapter-grid" id="chapterGrid"></div>

        <!-- フッター -->
        <div class="chapter-footer" data-i18n="chapters.footer">RSU学習ツール</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var chapters = [
                { ch: 1, title: 'こたつの入社 — RSUって何？' },
                { ch: 2, title: '申告の迷宮 — 確定申告って必要？' },
                { ch: 3, title: 'Morgan Stanleyの試練' },
                { ch: 4, title: '売るか持つか、それが問題だ' },
                { ch: 5, title: 'タイガー道場・為替の試練' },
                { ch: 6, title: '失敗道場 — よくあるRSUの落とし穴' },
                { ch: 7, title: '給与明細の謎を解け' }
            ];

            var grid = document.getElementById('chapterGrid');

            chapters.forEach(function(chapter) {
                var isCleared = localStorage.getItem('rsu_ch' + chapter.ch + '_cleared') === 'true';

                var card = document.createElement('div');
                card.className = 'chapter-card' + (isCleared ? ' cleared' : '');
                card.addEventListener('click', function() {
                    window.location.href = 'rpg.html?ch=' + chapter.ch;
                });

                // Thumbnail
                var thumb = document.createElement('img');
                thumb.className = 'card-thumbnail';
                var chPad = chapter.ch.toString().padStart(2, '0');
                thumb.src = '../images/backgrounds/ch' + chPad + '-top.webp';
                thumb.alt = chapter.title;
                thumb.onerror = function() { this.style.display = 'none'; };
                card.appendChild(thumb);

                // Chapter number
                var chNum = document.createElement('div');
                chNum.className = 'card-chapter-number';
                chNum.textContent = 'Chapter ' + chapter.ch;
                card.appendChild(chNum);

                // Title
                var title = document.createElement('div');
                title.className = 'card-title';
                var titleKey = 'ch' + chapter.ch + '.title';
                title.textContent = (window.I18n && window.I18n.t) ? window.I18n.t(titleKey) : chapter.title;
                title.setAttribute('data-i18n', titleKey);
                card.appendChild(title);
                card.appendChild(title);

                grid.appendChild(card);
            });
        });
    </script>
    <script src="../js/i18n.js"></script>
</body>
</html>
