<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧭 RSU Compass</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .top-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../images/special/top-visual.webp');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        .top-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                180deg,
                rgba(0, 0, 0, 0.1) 0%,
                rgba(0, 0, 0, 0.2) 30%,
                rgba(10, 15, 40, 0.65) 55%,
                rgba(10, 15, 40, 0.9) 100%
            );
        }

        .top-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 0 40px 10vh;
        }

        .top-title-area {
            text-align: center;
            margin-bottom: 14px;
        }

        .top-title {
            font-size: 3.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            letter-spacing: 3px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .top-title__icon {
            width: 56px;
            height: 56px;
            object-fit: contain;
            border-radius: 8px;
        }

        .top-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            letter-spacing: 1px;
        }

        .mode-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-bottom: 14px;
            max-width: 1000px;
            width: 100%;
        }

        .mode-card {
            background: rgba(10, 15, 35, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 32px 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.3s ease,
                        background 0.3s ease,
                        border-color 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .mode-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(20, 30, 55, 0.35);
            border-color: rgba(150, 180, 255, 0.3);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3),
                        0 0 20px rgba(100, 140, 255, 0.08);
        }

        .mode-card__icon {
            font-size: 2.6rem;
            margin-bottom: 4px;
        }

        .mode-card__title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .mode-card__desc {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        .mode-card__btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 9px 20px;
            background: rgba(100, 140, 255, 0.12);
            border: 1px solid rgba(100, 140, 255, 0.25);
            border-radius: 50px;
            font-size: 0.82rem;
            color: rgba(180, 200, 255, 0.85);
            font-weight: 600;
            transition: background 0.2s, transform 0.2s;
        }

        .mode-card:hover .mode-card__btn {
            background: rgba(100, 140, 255, 0.22);
            transform: scale(1.05);
        }

        .top-quick-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            max-width: 400px;
            margin-bottom: 8px;
        }

        .top-quick-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(15, 22, 45, 0.35);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                        background 0.3s ease,
                        border-color 0.3s ease;
            cursor: pointer;
        }

        .top-quick-btn:hover {
            transform: translateY(-4px);
            background: rgba(25, 38, 70, 0.55);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .top-quick-btn__icon { font-size: 1.2rem; }
        .top-quick-btn__text { display: flex; flex-direction: column; }
        .top-quick-btn__label { font-weight: 700; font-size: 0.85rem; }
        .top-quick-btn__sub { font-size: 0.65rem; color: rgba(255, 255, 255, 0.4); }

        .top-footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
        }

        /* タブレット・スマホ縦 */
        @media (max-width: 768px) {
            .top-container { padding: 0 12px 10px; }
            .top-title { font-size: 1.4rem; gap: 8px; }
            .top-title__icon { width: 32px; height: 32px; }
            .mode-cards { grid-template-columns: 1fr; gap: 6px; }
            .mode-card { padding: 10px 12px; gap: 4px; flex-direction: row; align-items: center; }
            .mode-card__icon { font-size: 1.4rem; margin-bottom: 0; }
            .mode-card__title { font-size: 0.85rem; }
            .mode-card__desc { display: none; }
            .mode-card__btn { display: none; }
            .top-subtitle { font-size: 0.75rem; }
            .top-title-area { margin-bottom: 8px; }
        }

        /* iPhone縦画面 (portrait) */
        @media (max-width: 480px) and (orientation: portrait) {
            .top-container { padding: 0 10px 6px; }
            .top-title { font-size: 1.2rem; gap: 6px; }
            .top-title__icon { width: 26px; height: 26px; }
            .mode-cards { gap: 5px; }
            .mode-card { padding: 10px 12px; }
            .mode-card__icon { font-size: 1.2rem; }
            .mode-card__title { font-size: 0.8rem; }
            .top-subtitle { font-size: 0.65rem; }
            .top-title-area { margin-bottom: 6px; }
            .top-footer { font-size: 0.55rem; }
        }

        /* iPhone横画面 (landscape) */
        @media (max-height: 500px) and (orientation: landscape) {
            .top-container { padding: 0 16px 4px; justify-content: center; }
            .top-title { font-size: 1.1rem; gap: 6px; margin-bottom: 2px; }
            .top-title__icon { width: 22px; height: 22px; }
            .top-title-area { margin-bottom: 4px; }
            .top-subtitle { font-size: 0.6rem; }
            .mode-cards { gap: 5px; grid-template-columns: repeat(3, 1fr); }
            .mode-card { padding: 8px 8px; gap: 3px; }
            .mode-card__icon { font-size: 1rem; margin-bottom: 0; }
            .mode-card__title { font-size: 0.65rem; }
            .mode-card__desc { display: none; }
            .mode-card__btn { display: none; }
            .top-footer { font-size: 0.45rem; }
            .top-quick-actions { display: none; }
        }
    </style>
</head>
<body>
    <div class="top-bg"></div>

    <div class="top-container">
        <div class="top-title-area">
            <h1 class="top-title">
                <img src="../images/special/title-icon.webp" alt="RSU Compass" class="top-title__icon">
            <h1 class="top-title">
                <img src="../images/special/title-icon.webp" alt="RSU Compass" class="top-title__icon">
                <span  data-i18n="top.title">RSU Compass</span>
            </h1>
            <p class="top-subtitle"><span  data-i18n="top.subtitle">RSUと確定申告を楽しく学ぼう！</span></p>
        </div>

        <div class="mode-cards">
            <a href="rpg.html" class="mode-card">
                <div class="mode-card__icon">🗺️</div>
                <div class="mode-card__title" data-i18n="top.mode.rpg">RPGモード</div>
                <div class="mode-card__desc" data-i18n="top.mode.rpg.desc">ストーリーで学ぶ</div>
                <div class="mode-card__btn" data-i18n="top.mode.rpg.btn">ストーリーを進める ＞</div>
            </a>
            <a href="chapters.html" class="mode-card">
                <div class="mode-card__icon">📖</div>
                <div class="mode-card__title" data-i18n="top.mode.chapters">チャプター選択</div>
                <div class="mode-card__desc" data-i18n="top.mode.chapters.desc">好きな章から学習</div>
                <div class="mode-card__btn" data-i18n="top.mode.chapters.btn">チャプターを選ぶ ＞</div>
            </a>
            <a href="simulator.html" class="mode-card">
                <div class="mode-card__icon">📊</div>
                <div class="mode-card__title" data-i18n="top.mode.sim">シミュレーション</div>
                <div class="mode-card__desc" data-i18n="top.mode.sim.desc">実際に計算してみる</div>
                <div class="mode-card__btn" data-i18n="top.mode.sim.btn">シミュレーションを開始 ＞</div>
            </a>
        </div>

        <div class="top-quick-actions">
            <a href="#" class="top-quick-btn" id="continue-btn" style="display:none;">
                <span class="top-quick-btn__icon">▶</span>
                <span class="top-quick-btn__text">
                    <span class="top-quick-btn__label" data-i18n="top.continue">つづきから</span>
                    <span class="top-quick-btn__sub" id="continue-sub"></span>
                </span>
            </a>
        </div>

        <div class="top-footer" data-i18n="top.footer">RSU学習ツール</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var clearedCount = 0;
            var nextChapter = 1;
            for (var i = 1; i <= 7; i++) {
                if (localStorage.getItem('rsu_ch' + i + '_cleared') === 'true') {
                    clearedCount++;
                    nextChapter = i + 1;
                }
            }
            if (clearedCount > 0 && nextChapter <= 7) {
                var btn = document.getElementById('continue-btn');
                btn.style.display = 'flex';
                btn.href = 'rpg.html?ch=' + nextChapter;
                document.getElementById('continue-sub').textContent = '第' + nextChapter + '章から再開';
            }
        });
    </script>
    <script src="../js/i18n.js"></script>
</body>
</html>
