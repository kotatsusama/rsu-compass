<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こたつのRSU冒険</title>
    <link rel="stylesheet" href="../css/vn-engine.css">
</head>
<body>
    <!-- ===== ビジュアルノベルコンテナ ===== -->
    <div class="vn-container">
        <!-- プログレスバー -->
        <div class="vn-progress">
            <div class="vn-progress__bar" id="vn-progress-bar" style="width: 0%"></div>
        </div>

        <!-- パンくずリスト & ヘッダーUI -->
        <div class="vn-header">
            <nav class="vn-breadcrumb">
                <a href="index.html" data-i18n="rpg.breadcrumb.top">トップ</a>
                <span>＞</span>
                <a href="chapters.html" data-i18n="rpg.breadcrumb.chapters">チャプター選択</a>
                <span class="vn-breadcrumb__current" id="vn-breadcrumb-ch" data-i18n="rpg.breadcrumb.current">RPGモード</span>
            </nav>
            <div class="vn-header__score" id="vn-score">✦ 0/0</div>
        </div>

        <!-- 背景レイヤー -->
        <div class="vn-background" id="vn-background">
            <div class="vn-background-placeholder"></div>
        </div>

        <!-- キャラクターレイヤー -->
        <div class="vn-characters" id="vn-characters"></div>

        <!-- UIレイヤー（テキストウィンドウ / クイズ / 結果） -->
        <div id="vn-ui"></div>
    </div>

    <!-- ===== スクリプト読み込み（順序重要） ===== -->
    <!-- 多言語切替 -->
    <script src="../js/i18n.js"></script>
    <!-- データ -->
    <script src="../data/characters.js"></script>
    <script src="../data/backgrounds.js"></script>
    <!-- チャプターデータ（全7章） -->
    <script src="../data/ch1-rsu-basics.js"></script>
    <script src="../data/ch2-tax-filing.js"></script>
    <script src="../data/ch3-morgan-stanley.js"></script>
    <script src="../data/ch4-sell-or-hold.js"></script>
    <script src="../data/ch5-forex-basics.js"></script>
    <script src="../data/ch6-mistakes.js"></script>
    <script src="../data/ch7-payslip.js"></script>
    <!-- エンジン -->
    <script src="../data/translations-en.js"></script>
    <!-- エンジン -->
    <script src="../js/vn-engine.js"></script>

    <!-- ===== 初期化 ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // URLパラメータからチャプター番号取得
            var params = new URLSearchParams(window.location.search);
            var chNum = parseInt(params.get('ch'), 10) || 1;

            // チャプターデータマッピング
            var dataMap = {
                1: (typeof CH1_DATA !== 'undefined') ? CH1_DATA : null,
                2: (typeof CH2_DATA !== 'undefined') ? CH2_DATA : null,
                3: (typeof CH3_DATA !== 'undefined') ? CH3_DATA : null,
                4: (typeof CH4_DATA !== 'undefined') ? CH4_DATA : null,
                5: (typeof CH5_DATA !== 'undefined') ? CH5_DATA : null,
                6: (typeof CH6_DATA !== 'undefined') ? CH6_DATA : null,
                7: (typeof CH7_DATA !== 'undefined') ? CH7_DATA : null
            };

            var data = dataMap[chNum];

            if (data && window.VNEngine) {
                // パンくずリスト更新
                var bcEl = document.getElementById('vn-breadcrumb-ch');
                if (bcEl && data.title) bcEl.textContent = 'Ch' + chNum + ': ' + data.title;
                VNEngine.init(data);
            } else {
                // データ未実装
                document.getElementById('vn-ui').innerHTML = '' +
                    '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#e8e8e8;">' +
                    '  <div style="font-size:3rem;margin-bottom:16px;">🚧</div>' +
                    '  <h2 style="color:#f7d794;">Chapter ' + chNum + ' — 準備中</h2>' +
                    '  <p style="color:#94a3b8;margin-top:8px;">このチャプターはまだ冒険の書が完成していません。</p>' +
                    '  <a href="?ch=1" style="color:#FF9900;margin-top:16px;display:inline-block;">Ch1 から始める</a>' +
                    '</div>';
            }
        });
    </script>
</body>
</html>
